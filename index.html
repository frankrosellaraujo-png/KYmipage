<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi bonita 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Librería para el efecto de confeti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- Tu nota de voz grabada en MP3 -->
<audio id="bgMusic" src="carta_voz.mp3"></audio>

<div class="container">
    <!-- BOTÓN DE INICIO -->
    <button id="openBtn" onclick="openLetter()">Abrir para Kory 💌</button>

    <!-- CARTA -->
    <div class="card" id="card">
        <h1>💖 Para ti, Kory</h1>
        
        <!-- CONTADOR DE TIEMPO -->
        <div id="counter-box" class="counter-box">
            <p class="counter-title">Llevamos juntos:</p>
            <div id="timer" class="timer">0 días, 0h 0m 0s</div>
        </div>

        <!-- Caja con scroll para el texto -->
        <div class="text-box">
            <p id="text"></p>
        </div>

        <!-- SECCIÓN DE PREGUNTA INTERACTIVA -->
        <div id="quiz-section" class="quiz-section" style="display: none;">
            <p class="quiz-title">¿Te gustó la sorpresa? 🥺</p>
            <div class="quiz-buttons">
                <button id="siBtn" onclick="celebrate()">¡SÍ! 😍</button>
                <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">NO 😜</button>
            </div>
        </div>

        <button id="closeBtn" class="close-btn" onclick="closeLetter()">Cerrar ✨</button>
    </div>
</div>

<script>
const normalText = [
    "Eres bonita como el sol en la mañana 💕",
    "como el cielo cuando su azul no se desgana ✨️",
    "eres ese respiro que calma el alma entera ❤️‍🩹",
    "la paz llega cuando todo desespera 💖",
    "eres bonita sin hacer el intento ❤️💗",
    "tu risa es melodía ✨️ tu voz una canción 🥺",
    "y cuando hablas se acelera el corazón ❤️✨️",
    "eres magia que no se compra 🌟🫶",
    "eres luz que se entiende ❤️",
    "y simplemente me encantas 🥺💖"
];

let currentTimeout;
let currentInterval;
let heartInterval;
let timerInterval;

// FECHA DE ANIVERSARIO: 13 de Febrero de 2026
const anniversaryDate = new Date("2026-02-13T00:00:00"); 

function updateCounter() {
    const now = new Date();
    const diff = now - anniversaryDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("timer").innerHTML = `${days} días, ${hours}h ${minutes}m ${seconds}s`;
}

function openLetter() {
    document.getElementById("openBtn").style.display = "none";
    document.getElementById("card").classList.add("show");
    
    typeLines(normalText);
    heartInterval = setInterval(createHeart, 300);
    
    // Iniciar contador
    updateCounter();
    timerInterval = setInterval(updateCounter, 1000);

    const audio = document.getElementById("bgMusic");
    audio.currentTime = 0; 
    audio.play().catch(e => console.log("Audio bloqueado por el navegador"));
}

function closeLetter() {
    clearInterval(currentInterval);
    clearTimeout(currentTimeout);
    clearInterval(heartInterval);
    clearInterval(timerInterval);
    
    document.getElementById("card").classList.remove("show");
    document.getElementById("text").innerHTML = "";
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("openBtn").style.display = "inline-block";
    document.getElementById("noBtn").style.position = "static";

    document.getElementById("bgMusic").pause();
}

function typeLines(lines) {
    let el = document.getElementById("text");
    el.innerHTML = "";
    let i = 0; let j = 0;

    function write() {
        if (i >= lines.length) {
            // Cuando termina el texto, muestra la pregunta con los botones
            document.getElementById("quiz-section").style.display = "block";
            return;
        }
        let line = Array.from(lines[i]);

        currentInterval = setInterval(() => {
            if (!line[j]) return;
            el.innerHTML += line[j];
            j++;

            if (j >= line.length) {
                clearInterval(currentInterval);
                el.innerHTML += "<br><br>";
                i++;
                j = 0;
                currentTimeout = setTimeout(write, 400); 
            }
        }, 20); 
    }
    write();
}

function moveNoButton() {
    const noBtn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
    
    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function celebrate() {
    var duration = 4 * 1000;
    var end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 5,
        angle: 60,
        spread: 55,
        origin: { x: 0, y: 0.8 }
      });
      confetti({
        particleCount: 5,
        angle: 120,
        spread: 55,
        origin: { x: 1, y: 0.8 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    }());
    
    alert("¡Sabía que te encantaría! Te amo un montón 💖");
}

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = ['💖','💝','❤️','💕','💗'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = Math.random() * 2 + 3 + 's';
    heart.style.fontSize = Math.random() * 10 + 15 + 'px';
    document.body.appendChild(heart);

    setTimeout(() => { heart.remove(); }, 4000);
}

document.addEventListener('mousemove', (e) => { createSparkle(e.clientX, e.clientY); });
document.addEventListener('touchmove', (e) => { createSparkle(e.touches[0].clientX, e.touches[0].clientY); });

function createSparkle(x, y) {
    const sparkle = document.createElement('div');
    sparkle.classList.add('sparkle');
    sparkle.innerHTML = '✨';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    document.body.appendChild(sparkle);

    setTimeout(() => { sparkle.remove(); }, 800);
}
</script>

</body>
</html>
